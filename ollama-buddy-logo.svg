<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect x="20" y="20" width="160" height="160" rx="30" fill="#2d2d2d"></rect>

  <!-- Side brackets -->
  <path d="M50 60 L35 60 L35 140 L50 140" stroke="#7B5294" stroke-width="8" fill="none"></path>
  <path d="M150 60 L165 60 L165 140 L150 140" stroke="#7B5294" stroke-width="8" fill="none"></path>

  <!-- Smaller rounded ears (closer together) -->
  <path d="M88 76
           Q86 64 88 56
           Q92 52 96 60
           Q96 68 93 76 Z" fill="#eee"></path>

  <path d="M112 76
           Q114 64 112 56
           Q108 52 104 60
           Q104 68 107 76 Z" fill="#eee"></path>

  <!-- Head -->
  <path d="
    M85 75
    Q100 55 115 75
    L115 110
    Q115 140 100 140
    Q85 140 85 110
    Z
  " fill="#eee"></path>

  <!-- Darker muzzle -->
  <ellipse cx="100" cy="112" rx="12" ry="10" fill="#ccc"></ellipse>

  <!-- Eyes -->
  <circle cx="92" cy="92" r="3" fill="#2d2d2d"></circle>
  <circle cx="108" cy="92" r="3" fill="#2d2d2d"></circle>

  <!-- Nose -->
  <ellipse cx="100" cy="110" rx="3" ry="2" fill="#2d2d2d"></ellipse>

  <!-- Mouth -->
  <path d="M94 118 Q100 124 106 118" stroke="#2d2d2d" stroke-width="2" fill="none" stroke-linecap="round"></path>

</svg>
